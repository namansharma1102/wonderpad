<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Wonderpad Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Newsreader:opsz,wght@6..72,400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container-lowest": "#ffffff",
                      "on-secondary-container": "#5c647a",
                      "surface-dim": "#cbdbf5",
                      "tertiary-fixed": "#ebe2cd",
                      "on-primary": "#ffffff",
                      "surface-container-highest": "#d3e4fe",
                      "on-secondary": "#ffffff",
                      "on-tertiary-fixed": "#1f1b0f",
                      "surface-tint": "#9d4400",
                      "on-tertiary": "#ffffff",
                      "tertiary-fixed-dim": "#cec6b2",
                      "inverse-on-surface": "#eaf1ff",
                      "on-primary-fixed": "#331100",
                      "primary-fixed": "#ffdbca",
                      "on-error": "#ffffff",
                      "on-surface-variant": "#584237",
                      "on-primary-container": "#fffbff",
                      "tertiary-container": "#7a7463",
                      "surface": "#f8f9ff",
                      "tertiary": "#615c4b",
                      "inverse-surface": "#213145",
                      "on-tertiary-container": "#fffbff",
                      "secondary-fixed-dim": "#bec6e0",
                      "outline": "#8c7265",
                      "secondary-fixed": "#dae2fd",
                      "on-secondary-fixed-variant": "#3f465c",
                      "secondary-container": "#dae2fd",
                      "on-background": "#0b1c30",
                      "inverse-primary": "#ffb690",
                      "background": "#f8f9ff",
                      "surface-container-high": "#dce9ff",
                      "surface-container-low": "#eff4ff",
                      "on-surface": "#0b1c30",
                      "on-secondary-fixed": "#131b2e",
                      "surface-variant": "#d3e4fe",
                      "outline-variant": "#e0c0b1",
                      "surface-container": "#e5eeff",
                      "primary": "#994200",
                      "primary-container": "#c05400",
                      "surface-bright": "#f8f9ff",
                      "on-error-container": "#93000a",
                      "on-primary-fixed-variant": "#783200",
                      "error-container": "#ffdad6",
                      "secondary": "#565e74",
                      "error": "#ba1a1a",
                      "on-tertiary-fixed-variant": "#4b4637",
                      "primary-fixed-dim": "#ffb690"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "spacing": {
                      "reader-width": "720px",
                      "container-max": "1280px",
                      "xl": "40px",
                      "sm": "8px",
                      "md": "16px",
                      "xs": "4px",
                      "lg": "24px"
              },
              "fontFamily": {
                      "headline-md": ["Inter"],
                      "display-lg": ["Inter"],
                      "reader-body": ["Newsreader"],
                      "ui-body": ["Inter"],
                      "label-sm": ["Inter"]
              },
              "fontSize": {
                      "headline-md": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "reader-body": ["20px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                      "ui-body": ["16px", {"lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400"}],
                      "label-sm": ["13px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}]
              }
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #F2F2F7; /* iOS standard light gray */
        }
        .ios-divider {
            border-bottom: 0.5px solid #C6C6C8;
        }
        .ios-divider:last-child {
            border-bottom: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-ui-body text-on-surface antialiased">
<!-- Top App Bar -->
<header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 fixed top-0 w-full z-50 h-16 flex justify-between items-center px-4">
<div class="flex items-center">
<button class="flex items-center justify-center w-10 h-10 text-primary transition-colors duration-200 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
</div>
<div class="flex-grow text-center">
<h1 class="text-on-surface font-headline-md text-ui-body font-bold">Settings</h1>
</div>
<div class="w-10 flex justify-end">
<!-- Spacing placeholder for symmetry -->
</div>
</header>
<main class="max-w-[600px] mx-auto pt-24 pb-32 px-4 space-y-8">
<!-- Account Section -->
<section>
<h2 class="px-4 mb-2 text-label-sm font-label-sm uppercase text-on-secondary-container">Account</h2>
<div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm border border-slate-200">
<!-- Profile Row -->
<div class="flex items-center p-4 ios-divider">
<div class="w-16 h-16 bg-primary-fixed text-on-primary-fixed-variant rounded-full flex items-center justify-center font-bold text-headline-md mr-4 overflow-hidden">
                        JS
                    </div>
<div class="flex flex-col">
<span class="font-bold text-on-surface text-ui-body">Jane Smith</span>
<span class="text-on-secondary-container text-sm">jane.smith@example.com</span>
</div>
</div>
<!-- Change Password -->
<button class="w-full flex items-center justify-between p-4 ios-divider hover:bg-slate-50 transition-colors">
<span class="text-on-surface">Change Password</span>
<span class="material-symbols-outlined text-slate-400" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>
<!-- Reading Defaults Section -->
<section>
<h2 class="px-4 mb-2 text-label-sm font-label-sm uppercase text-on-secondary-container">Reading Defaults</h2>
<div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm border border-slate-200">
<button class="w-full flex items-center justify-between p-4 ios-divider hover:bg-slate-50 transition-colors">
<span class="text-on-surface">Default Theme</span>
<div class="flex items-center text-on-secondary-container">
<span class="mr-2">Sepia</span>
<span class="material-symbols-outlined text-slate-400" data-icon="chevron_right">chevron_right</span>
</div>
</button>
<button class="w-full flex items-center justify-between p-4 ios-divider hover:bg-slate-50 transition-colors">
<span class="text-on-surface">Default Font Size</span>
<div class="flex items-center text-on-secondary-container">
<span class="mr-2">18px</span>
<span class="material-symbols-outlined text-slate-400" data-icon="chevron_right">chevron_right</span>
</div>
</button>
<button class="w-full flex items-center justify-between p-4 ios-divider hover:bg-slate-50 transition-colors">
<span class="text-on-surface">Default Font Family</span>
<div class="flex items-center text-on-secondary-container">
<span class="mr-2">Serif</span>
<span class="material-symbols-outlined text-slate-400" data-icon="chevron_right">chevron_right</span>
</div>
</button>
</div>
</section>
<!-- About Section -->
<section>
<h2 class="px-4 mb-2 text-label-sm font-label-sm uppercase text-on-secondary-container">About</h2>
<div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm border border-slate-200">
<div class="flex items-center justify-between p-4 ios-divider">
<span class="text-on-surface">Version</span>
<span class="text-on-secondary-container">1.2.4</span>
</div>
<button class="w-full flex items-center justify-between p-4 ios-divider hover:bg-slate-50 transition-colors">
<span class="text-on-surface">Privacy Policy</span>
<span class="material-symbols-outlined text-slate-400" data-icon="open_in_new">open_in_new</span>
</button>
<button class="w-full flex items-center justify-between p-4 ios-divider hover:bg-slate-50 transition-colors">
<span class="text-on-surface">Terms of Service</span>
<span class="material-symbols-outlined text-slate-400" data-icon="open_in_new">open_in_new</span>
</button>
</div>
</section>
<!-- Danger Zone -->
<section>
<h2 class="px-4 mb-2 text-label-sm font-label-sm uppercase text-error">Danger Zone</h2>
<div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm border border-slate-200">
<button class="w-full flex items-center justify-between p-4 hover:bg-red-50 transition-colors">
<span class="text-error font-semibold">Delete Account</span>
<span class="material-symbols-outlined text-error" data-icon="delete">delete</span>
</button>
</div>
</section>
<div class="mt-8 text-center">
<div class="flex justify-center mb-4">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-white text-3xl" data-icon="auto_stories" style="font-variation-settings: 'FILL' 1;">auto_stories</span>
</div>
</div>
<p class="text-on-secondary-container font-label-sm uppercase">Wonderpad</p>
<p class="text-xs text-slate-400 mt-1">Made with love for readers everywhere.</p>
</div>
</main>
<!-- Bottom Nav Bar (Shared Component) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 pb-safe bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-t border-slate-200 dark:border-slate-800">
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 hover:text-orange-500 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="library_books">library_books</span>
<span class="text-[10px] font-medium uppercase tracking-wider Inter">Library</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 hover:text-orange-500 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="auto_stories">auto_stories</span>
<span class="text-[10px] font-medium uppercase tracking-wider Inter">Reader</span>
</a>
<a class="flex flex-col items-center justify-center text-orange-600 dark:text-orange-500 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="settings" style="font-variation-settings: 'FILL' 1;">settings</span>
<span class="text-[10px] font-medium uppercase tracking-wider Inter">Settings</span>
</a>
</nav>
</body></html>
