<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Wonderpad - Sign In</title>

                    "secondary": "#565e74",

                    "primary-container": "#c05400",
                    "tertiary-fixed-dim": "#cec6b2",
                    "primary-fixed-dim": "#ffb690",
                    "tertiary-fixed": "#ebe2cd",
                    "on-surface-variant": "#584237",
                    "on-secondary-container": "#5c647a",
                    "surface-dim": "#cbdbf5",
                    "on-secondary-fixed": "#131b2e",
                    "tertiary-container": "#7a7463",
                    "primary": "#994200",
                    "on-tertiary-container": "#fffbff",
                    "on-primary-fixed-variant": "#783200",
                    "surface-variant": "#d3e4fe",
                    "on-primary": "#ffffff",
                    "inverse-primary": "#ffb690",
                    "secondary-fixed-dim": "#bec6e0",

                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed-variant": "#4b4637",
                    "on-background": "#0b1c30",
                    "error": "#ba1a1a",
                    "on-primary-fixed": "#331100",
                    "surface-bright": "#f8f9ff",
                    "on-tertiary": "#ffffff",
                    "secondary-fixed": "#dae2fd",
                    "on-error": "#ffffff",
                    "wonderpad-orange": "#E8690A"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "md": "16px",
                    "lg": "24px",
                    "sm": "8px",
                    "container-max": "1280px",
                    "xs": "4px",
                    "xl": "40px",
                    "reader-width": "720px"
            },
            "fontFamily": {
                    "ui-body": ["Inter"],
                    "headline-md": ["Inter"],
                    "display-lg": ["Inter"],
                    "label-sm": ["Inter"],
                    "reader-body": ["Newsreader"]
            },
            "fontSize": {
                    "ui-body": ["16px", {"lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-sm": ["13px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],

          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .focus-ring:focus-within {
            box-shadow: 0 0 0 2px #E8690A;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-ui-body text-on-surface antialiased min-h-screen flex flex-col items-center">
<!-- Suppressed Navigation Shell for Transactional Context as per mandate -->
<main class="w-full max-w-md px-6 py-12 flex flex-col items-center justify-center grow">
<!-- Brand Header -->
<header class="flex flex-col items-center gap-4 mb-10">
<div class="flex items-center gap-2 text-xl font-bold text-wonderpad-orange">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
<span>Wonderpad</span>
</div>
<div class="text-center">
<h1 class="font-headline-md text-headline-md text-on-surface mb-1">Welcome back.</h1>
<p class="font-ui-body text-ui-body text-secondary">Sign in to continue reading.</p>
</div>
</header>
<!-- Social Login -->
<div class="w-full space-y-4 mb-8">
<button class="w-full flex items-center justify-center gap-3 py-4 border border-outline-variant bg-white rounded-full font-ui-body font-semibold text-on-surface hover:bg-surface-container-low transition-colors duration-200">
<!-- Simple SVG for Google G -->
<svg height="20" viewbox="0 0 20 20" width="20">
<path d="M19.6 10.23c0-.66-.06-1.29-.17-1.91H10v3.61h5.38c-.23 1.25-.94 2.31-2 3.03v2.51h3.25c1.9-1.75 3-4.32 3-7.24z" fill="#4285F4"></path>
<path d="M10 20c2.7 0 4.96-.89 6.62-2.42l-3.25-2.51c-.9.61-2.06.97-3.37.97-2.6 0-4.8-1.75-5.58-4.12H1.22v2.59C2.88 17.75 6.2 20 10 20z" fill="#34A853"></path>
<path d="M4.42 11.92c-.2-.61-.31-1.25-.31-1.92s.11-1.31.31-1.92V5.49H1.22A9.976 9.976 0 0 0 0 10c0 1.63.39 3.17 1.08 4.54l3.34-2.62z" fill="#FBBC05"></path>
<path d="M10 3.96c1.47 0 2.78.5 3.82 1.5l2.87-2.87C14.95.96 12.7 0 10 0 6.2 0 2.88 2.25 1.22 5.49l3.2 2.51c.78-2.37 2.98-4.12 5.58-4.12z" fill="#EA4335"></path>
</svg>
<span>Continue with Google</span>
</button>
</div>
<!-- Divider -->
<div class="w-full flex items-center gap-4 mb-8">
<div class="h-[1px] flex-grow bg-outline-variant"></div>
<span class="font-label-sm text-label-sm text-secondary tracking-widest">OR</span>
<div class="h-[1px] flex-grow bg-outline-variant"></div>
</div>
<!-- Manual Form -->
<form class="w-full space-y-6">
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface uppercase tracking-wider" for="email">Email Address</label>
<div class="relative focus-ring rounded-xl transition-all">
<input class="w-full px-4 py-4 bg-slate-50 border border-outline-variant rounded-xl focus:border-wonderpad-orange focus:ring-0 text-on-surface placeholder:text-secondary/50" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface uppercase tracking-wider" for="password">Password</label>
<div class="relative group focus-ring rounded-xl transition-all">
<input class="w-full px-4 py-4 bg-slate-50 border border-outline-variant rounded-xl focus:border-wonderpad-orange focus:ring-0 text-on-surface placeholder:text-secondary/50" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-secondary hover:text-wonderpad-orange" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
<div class="flex justify-end">
<a class="font-label-sm text-label-sm text-wonderpad-orange hover:underline font-semibold" href="#">Forgot password?</a>
</div>
</div>
<button class="w-full py-4 bg-wonderpad-orange text-white rounded-full font-headline-md text-ui-body font-bold hover:brightness-110 transition-all duration-200 shadow-sm active:scale-[0.98]" type="submit">
                Sign In
            </button>
</form>
<!-- Footer Link -->
<div class="mt-12 text-center">
<p class="font-ui-body text-ui-body text-secondary">
                New to Wonderpad? <a class="text-wonderpad-orange font-bold hover:underline" href="#">Create an account</a>
</p>
</div>
</main>
<!-- Footer Component as per JSON -->
<footer class="w-full mt-auto py-12 border-t border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-950">
<div class="flex flex-col md:flex-row justify-between items-center w-full px-6 max-w-7xl mx-auto gap-4">
<div class="text-lg font-bold text-orange-600 dark:text-orange-500">Wonderpad</div>
<p class="text-sm font-inter text-slate-500 dark:text-slate-400">© 2024 Wonderpad. Read the new way.</p>
<div class="flex gap-6">
<a class="text-slate-500 hover:text-slate-900 dark:hover:text-slate-200 transition-colors" href="#">Privacy</a>
<a class="text-slate-500 hover:text-slate-900 dark:hover:text-slate-200 transition-colors" href="#">Terms</a>
</div>
</div>
</footer>
</body></html>
