<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .modal-backdrop {
      backdrop-filter: blur(8px);
    }
    .custom-dashed {
      background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='16' ry='16' stroke='%23CBD5E1' stroke-width='2' stroke-dasharray='8%2c 12' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");

    }

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface font-ui-body text-on-surface">
<!-- Background Library Content (Blurred) -->
<div class="fixed inset-0 overflow-hidden blur-md select-none pointer-events-none">
<!-- TopAppBar Mockup -->
<header class="bg-white/80 border-b border-slate-200 px-6 py-4 flex justify-between items-center">
<div class="text-2xl font-black text-[#E8690A] tracking-tighter">Wonderpad</div>
<div class="w-10 h-10 rounded-full bg-slate-200"></div>
</header>
<main class="max-w-7xl mx-auto px-6 py-12">
<div class="flex justify-between items-end mb-12">
<div>
<h1 class="font-display-lg text-display-lg text-on-surface mb-2">Library</h1>
<p class="text-slate-500 font-ui-body">Continue where you left off</p>
</div>
</div>
<!-- Bento Grid Mockup -->
<div class="grid grid-cols-1 md:grid-cols-12 gap-8">
<div class="md:col-span-8 h-96 bg-white border border-slate-200 rounded-xl p-8">
<div class="w-full h-full bg-slate-50 rounded-lg"></div>
</div>
<div class="md:col-span-4 h-96 bg-white border border-slate-200 rounded-xl p-8">
<div class="w-full h-full bg-slate-50 rounded-lg"></div>
</div>
</div>
</main>
<!-- BottomNavBar Mockup -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-3 bg-white/90 border-t border-slate-100">
<div class="flex flex-col items-center text-[#E8690A] bg-orange-50 rounded-full px-4 py-1">
<span class="material-symbols-outlined">library_books</span>
<span class="text-[10px] uppercase font-bold tracking-widest mt-1">Library</span>
</div>
<div class="flex flex-col items-center text-slate-400">
<span class="material-symbols-outlined">explore</span>
<span class="text-[10px] uppercase font-bold tracking-widest mt-1">Discover</span>
</div>
<div class="flex flex-col items-center text-slate-400">
<span class="material-symbols-outlined">bar_chart</span>
<span class="text-[10px] uppercase font-bold tracking-widest mt-1">Stats</span>
</div>
<div class="flex flex-col items-center text-slate-400">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] uppercase font-bold tracking-widest mt-1">Settings</span>
</div>
</nav>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/10 modal-backdrop">
<!-- Modal Container -->
<div class="bg-white w-full max-w-xl rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.1)] overflow-hidden border border-slate-100">
<!-- Header -->
<div class="px-8 pt-8 pb-4">
<h2 class="font-headline-md text-headline-md text-on-surface">Upload a Book</h2>
</div>
<!-- Content -->
<div class="px-8 pb-4">
<div class="custom-dashed bg-[#F9FAFB] hover:bg-slate-50 transition-colors cursor-pointer group">
<div class="flex flex-col items-center justify-center py-16 px-6 text-center">
<div class="w-16 h-16 bg-white rounded-full shadow-sm flex items-center justify-center mb-6 border border-slate-100 group-hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-slate-400 text-3xl">upload_file</span>
</div>
<div class="space-y-1">
<p class="font-ui-body text-slate-600">
                Drag your PDF here
              </p>
<p class="font-ui-body text-slate-400">
                or <span class="text-[#E8690A] font-semibold">click to browse</span>
</p>
</div>
<div class="mt-12">
<div class="relative w-48 h-64 bg-white rounded-lg border border-slate-100 shadow-sm p-4 overflow-hidden opacity-40">
<div class="w-full h-32 bg-slate-100 rounded-sm mb-4"></div>
<div class="h-2 w-full bg-slate-50 rounded-full mb-2"></div>
<div class="h-2 w-3/4 bg-slate-50 rounded-full mb-2"></div>
<div class="h-2 w-1/2 bg-slate-50 rounded-full"></div>
</div>
</div>
</div>
</div>
<p class="mt-4 text-center text-slate-400 text-sm font-label-sm uppercase tracking-wider">
          50MB maximum
        </p>
</div>
<!-- Footer -->
<div class="px-8 py-6 bg-slate-50/50 flex items-center justify-end gap-6">
<button class="text-slate-500 hover:text-on-surface font-semibold text-sm font-label-sm transition-colors">
          Cancel
        </button>
<button class="bg-slate-200 text-slate-400 px-8 py-3 rounded-full font-bold text-sm font-label-sm cursor-not-allowed opacity-80" disabled="">
          Upload
        </button>
</div>
</div>
</div>
<!-- Hidden Visual Context for prompt compliance -->
<div class="hidden">
